name: Pages

# Publishes the invite landing page (pages/) to GitHub Pages. The page bounces
# an invite link into the app via the fieldchat:// scheme, with an install
# fallback. Enable Pages once in Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [master]
    paths:
      - pages/**
      - .github/workflows/pages.yaml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - id: deployment
        uses: actions/deploy-pages@v4
