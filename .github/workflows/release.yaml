name: Release


#   IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD   (Apple distribution cert)
#   IOS_PROVISIONING_PROFILE_BASE64
#   APPSTORE_ISSUER_ID, APPSTORE_KEY_ID, APPSTORE_PRIVATE_KEY  (App Store Connect API)

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track to upload to'
        type: choice
        options: [internal, alpha]
        default: internal
  push:
    tags: ['v*']

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  android:
    name: Android App Bundle
    runs-on: ubuntu-latest
    steps:
      # Full history so the versionCode below tracks the commit count.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Write signing config
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.jks
          cat > android/key.properties <<EOF
          storeFile=upload.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --build-number=$(git rev-list --count HEAD) \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v7
        with:
          name: hulaki-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.hulaki
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

  ios:
    name: iOS IPA
    if: vars.BUILD_IOS == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/hulaki.mobileprovision
      - name: Build IPA
        run: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --export-options-plist=ios/ExportOptions.plist
      - uses: actions/upload-artifact@v7
        with:
          name: hulaki-release-ipa
          path: build/ios/ipa/*.ipa
