<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Join a FieldChat group</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #F3F1EA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #15181B;
    }
    .card {
      max-width: 360px; margin: 24px; padding: 28px 24px; text-align: center;
      background: #fff; border: 1px solid #E7E3D8; border-radius: 18px;
    }
    .brand { font-size: 14px; font-weight: 700; letter-spacing: 1px;
      color: #9A968D; text-transform: uppercase; }
    h1 { font-size: 20px; margin: 14px 0 6px; }
    p { font-size: 14px; color: #5B5F64; margin: 0 0 20px; }
    a.btn {
      display: block; padding: 14px 16px; border-radius: 12px;
      text-decoration: none; font-weight: 600; font-size: 15px; margin: 10px 0;
    }
    a.primary { background: #15181B; color: #fff; }
    a.ghost { background: #F3F1EA; color: #15181B; }
    .muted { font-size: 12px; color: #9A968D; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">FieldChat</div>
    <h1>Open this group in FieldChat</h1>
    <p id="status">Opening the app…</p>
    <a class="btn primary" id="openApp" href="#">Open in FieldChat</a>
    <a class="btn ghost" id="install"
       href="https://github.com/kshitijrajsharma/FieldChat">Get the app</a>
    <div class="muted">The group key stays in this link's fragment and is
      never sent to a server.</div>
  </div>
  <script>
    // Group id travels in the query; the secret key is in the fragment, which
    // the browser never sends to the server. Both are read client-side and
    // handed to the app through its custom scheme.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var groupId = params.get('g');
      var key = window.location.hash.replace(/^#/, '');
      if (!groupId || !key) {
        document.getElementById('status').textContent =
          'This invite link is incomplete.';
        return;
      }
      var appUrl = 'fieldchat://join?g=' + encodeURIComponent(groupId) +
        '#' + key;
      document.getElementById('openApp').setAttribute('href', appUrl);
      // Auto-attempt the app on load; the button is the manual fallback.
      window.location.href = appUrl;
    })();
  </script>
</body>
</html>
