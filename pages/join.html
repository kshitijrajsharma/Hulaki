<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Join a FieldChat group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    /* Palette and type mirror lib/design: ink leads, paper is the background,
       mist the surface tone, amber reserved for accent. */
    :root {
      color-scheme: light;
      --ink: #15181B;
      --paper: #F6F4EE;
      --mist: #ECE7DF;
      --field: #F0ECDF;
      --white: #FFFFFF;
      --text-secondary: #5D584D;
      --text-muted: #8C887F;
      --text-faint: #9A968D;
      --amber: #E0922A;
    }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--paper); color: var(--ink);
      font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, sans-serif;
    }
    .card {
      max-width: 340px; margin: 24px; padding: 30px 26px; text-align: center;
      background: var(--white); border: 1px solid var(--mist);
      border-radius: 18px;
    }
    .lockup {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      margin-bottom: 22px;
    }
    .lockup svg { display: block; }
    .wordmark {
      font-size: 22px; font-weight: 800; letter-spacing: -0.8px;
      color: var(--ink);
    }
    h1 {
      font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
      margin: 0 0 6px;
    }
    p { font-size: 14px; color: var(--text-secondary); margin: 0 0 22px; }
    a.btn {
      display: block; padding: 14px 16px; border-radius: 12px;
      text-decoration: none; font-weight: 700; font-size: 15px; margin: 10px 0;
    }
    a.primary { background: var(--ink); color: var(--white); }
    a.ghost {
      background: var(--field); color: var(--ink);
      border: 1px solid var(--mist);
    }
    .muted { font-size: 12px; color: var(--text-faint); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lockup">
      <!-- The FieldChat mark from lib/design/brand: a navigation arrow over
           three typing dots, in a 100x84 viewbox. -->
      <svg width="26" height="22" viewBox="0 0 100 84" aria-hidden="true"
        fill="#15181B">
        <polygon points="50,12 72,58 50,46 28,58" />
        <circle cx="35" cy="74" r="6.2" />
        <circle cx="50" cy="74" r="6.2" />
        <circle cx="65" cy="74" r="6.2" />
      </svg>
      <span class="wordmark">FieldChat</span>
    </div>
    <h1>Open this group</h1>
    <p id="status">Opening the app…</p>
    <a class="btn primary" id="openApp" href="#">Open in FieldChat</a>
    <a class="btn ghost" id="install"
       href="https://github.com/kshitijrajsharma/FieldChat">Get the app</a>
    <div class="muted">The group key stays in this link's fragment and is
      never sent to a server.</div>
  </div>
  <script>
    // Group id travels in the query; the secret key is in the fragment, which
    // the browser never sends to the server. Both are read client-side and
    // handed to the app through its custom scheme.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var groupId = params.get('g');
      var key = window.location.hash.replace(/^#/, '');
      if (!groupId || !key) {
        document.getElementById('status').textContent =
          'This invite link is incomplete.';
        return;
      }
      var appUrl = 'fieldchat://join?g=' + encodeURIComponent(groupId) +
        '#' + key;
      document.getElementById('openApp').setAttribute('href', appUrl);
      // Auto-attempt the app on load; the button is the manual fallback.
      window.location.href = appUrl;
    })();
  </script>
</body>
</html>
